<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #a8dadc;
      min-height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; box-shadow: 0 0 16px #e94560; }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #reset:hover { background: #c73652; }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #a8dadc;
    }

    #scores span { font-weight: bold; color: white; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="scores">
    X wins: <span id="xScore">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="drawScore">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="oScore">0</span>
  </div>
  <div id="status">Player X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board = Array(9).fill(null);
    let current = 'X';
    let over = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = WINS.find(line => line.every(j => board[j] === current));
      if (win) {
        win.forEach(j => cells[j].classList.add('win'));
        status.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }));

    document.getElementById('reset').addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "Player X's turn";
    });

    function updateScores() {
      document.getElementById('xScore').textContent = scores.X;
      document.getElementById('oScore').textContent = scores.O;
      document.getElementById('drawScore').textContent = scores.draw;
    }
  </script>
</body>
</html>
